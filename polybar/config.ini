;=======================================================;
; polybar configuration

[colors]
background = #0D0221
background-alt = #1A0A3E
foreground = #E0D0FF
primary = #FF00FF
secondary = #00FFFF
alert = #FF2079
disabled = #4A3A6A
foreground-alt = #7B6B99
;[colors]
;background = ${xrdb:color0:#222}
;background = #222
;background-alt = #444
;foreground = ${xrdb:color7:#222}
;foreground = #dfdfdf
;foreground-alt = #555
;primary = #ffb52a
;secondary = #e60053
;alert = #bd2c40

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
;height = 27
height = 45
;offset-x = 1%
;offset-y = 1%
radius = 6.0
fixed-center = false
;bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = #f00

border-size = 4
border-color = #00000000

padding-left = 0
padding-right = 2

module-margin-left = 1
module-margin-right = 2

dpi-x = 192
dpi-y = 192

font-0 = 0xProto Nerd Font:style=Regular:pixelsize=10;2
font-1 = Font Awesome 6 Free Solid:style=Solid:pixelsize=12;2
font-2 = 0xProto Nerd Font:style=Regular:pixelsize=14;3

modules-left = i3
modules-center =
modules-right = theme weather slack tailscale pulseaudio bluetooth wlan eth cpu cpu-freq memory temperature battery battery-wattage power-profile date powermenu

;tray-position = right
;tray-padding = 2
;tray-scale = 1
;tray-maxsize = 12
;tray-background = #0063ff

;wm-restack = bspwm
;wm-restack = i3

;override-redirect = true

;scroll-up = bspwm-desknext
;scroll-down = bspwm-deskprev

;scroll-up = i3wm-wsnext
;scroll-down = i3wm-wsprev

cursor-click = pointer
cursor-scroll = ns-resize

[bar/vertical]
monitor = ${env:MONITOR:}
width = 100%
height = 35
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = #f00

border-size = 0
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin-left = 1
module-margin-right = 1

dpi-x = 192
dpi-y = 192

font-0 = 0xProto Nerd Font:style=Regular:pixelsize=8;2
font-1 = Font Awesome 6 Free Solid:style=Solid:pixelsize=10;2
font-2 = 0xProto Nerd Font:style=Regular:pixelsize=12;3

modules-left = i3
modules-center =
modules-right = date

cursor-click = pointer
cursor-scroll = ns-resize

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}
format-prefix-underline = ${colors.secondary}

label-layout = %layout%
label-layout-underline = ${colors.secondary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = ${colors.secondary}
label-indicator-underline = ${colors.secondary}

[module/theme]
type = custom/text
content = 
click-left = ~/.config/polybar/scripts/theme-switch.sh &

[module/weather]
type = custom/script
interval = 900
exec = ~/.config/polybar/scripts/weather.sh
tail = true
label = "%output%"
format = <label>
click-left = ~/.config/polybar/scripts/weather-details.sh &


[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#0a81f5} %mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/bspwm]
type = internal/bspwm

label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2

label-occupied = %index%
label-occupied-padding = 2

label-urgent = %index%!
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %index%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 2

; Separator in between workspaces
; label-separator = |

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = #000
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = 2

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

; Separator in between workspaces
label-separator = " "

[module/mpd]
type = internal/mpd
format-online = <label-song>  <icon-prev> <icon-stop> <toggle> <icon-next>

icon-prev = 
icon-stop = 
icon-play = 
icon-pause = 
icon-next = 

label-song-maxlen = 25
label-song-ellipsis = true

[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>
label = BL

bar-width = 10
bar-indicator = |
bar-indicator-foreground = #fff
bar-indicator-font = 2
bar-fill = ─
bar-fill-font = 2
bar-fill-foreground = #9f78e1
bar-empty = ─
bar-empty-font = 2
bar-empty-foreground = ${colors.foreground-alt}

[module/backlight-acpi]
inherit = module/xbacklight
type = internal/backlight
card = intel_backlight

[module/cpu]
type = internal/cpu
interval = 2
format = %{A1:~/.config/polybar/scripts/cpu-details.sh &:}<label>%{A}
format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}
format-underline = #f90000
label = %percentage:2%%

[module/cpu-freq]
type = custom/script
exec = ~/.config/polybar/scripts/cpu-freq.sh
interval = 3
click-left = ~/.config/polybar/scripts/cpu-details.sh &

[module/memory]
type = internal/memory
interval = 2
format = %{A1:~/.config/polybar/scripts/memory-details.sh &:}<label>%{A}
format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}
format-underline = #4bffdc
label = %percentage_used%%

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3.0

format-connected = %{A1:nm-connection-editor &:}%{A3:nmcli radio wifi off && sleep 1 && nmcli radio wifi on &:}<ramp-signal> <label-connected>%{A}%{A}
format-connected-underline = #9f78e1
label-connected = %essid%

format-disconnected = %{A1:nm-connection-editor &:}%{A3:nmcli radio wifi on &:}%{T3}󰤭%{T-} off%{A}%{A}
;format-disconnected = label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

ramp-signal-0 = %{T3}󰤟%{T-}
ramp-signal-1 = %{T3}󰤢%{T-}
ramp-signal-2 = %{T3}󰤥%{T-}
ramp-signal-foreground = ${colors.foreground-alt}

[module/eth]
type = internal/network
interface-type = wired
interval = 3.0

format-connected-underline = #55aa55
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.foreground-alt}
label-connected = %local_ip%

format-disconnected =
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

[module/date]
type = internal/date
interval = 5

date =
date-alt = " %Y-%m-%d"

time = %H:%M
time-alt = %H:%M:%S

format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}
format-underline = #0a6cf5

label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio

; Sink to be used, if it exists (find using `pacmd list-sinks`, name field)
; If not, uses default sink
; sink = alsa_output.pci-0000_12_00.3.analog-stereo

; Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
; Default: true
use-ui-max = true

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 5

; Reverses the increment/decrement on scroll event. Set this to true if you are
; using natural scrolling option on your touchpad.
; New in version 3.7.0
; Default: false
reverse-scroll = false

format-volume = <ramp-volume> <label-volume>
format-muted =  <label-muted>
format-muted-foreground = ${colors.disabled}
label-muted = muted

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.foreground-alt}

[module/alsa]
type = internal/alsa

format-volume = <label-volume> <bar-volume>
label-volume = VOL
label-volume-foreground = ${root.foreground}

format-muted-prefix = " "
format-muted-foreground = ${colors.foreground-alt}
#label-muted = muted

bar-volume-width = 10
bar-volume-foreground-0 = #55aa55
bar-volume-foreground-1 = #55aa55
bar-volume-foreground-2 = #55aa55
bar-volume-foreground-3 = #55aa55
bar-volume-foreground-4 = #55aa55
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = false
bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.foreground-alt}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging =  <ramp-capacity> <label-charging>
format-charging-underline = #ffb52a

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-underline = ${self.format-charging-underline}

format-full-prefix = " "
format-full-prefix-foreground = ${colors.foreground-alt}
format-full-underline = ${self.format-charging-underline}

ramp-capacity-0 = 
ramp-capacity-0-foreground = #E16D6D
ramp-capacity-1 = 
ramp-capacity-1-foreground = #E16D6D
ramp-capacity-2 = 
ramp-capacity-2-foreground = #D4C96E
ramp-capacity-3 = 
ramp-capacity-3-foreground = ${colors.foreground-alt}
ramp-capacity-4 = 
ramp-capacity-4-foreground = #A3D977

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60
base-temperature = 20
hwmon-path = __TEMP_SENSOR__

format = %{A1:~/.config/polybar/scripts/temp-details.sh &:}<ramp> <label>%{A}
format-underline = #f50a4d
format-warn = %{A1:~/.config/polybar/scripts/temp-details.sh &:}<ramp> <label-warn>%{A}
format-warn-underline = ${self.format-underline}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.foreground-alt}

[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-open = 
label-open-foreground = ${colors.secondary}
label-close =  cancel
label-close-foreground = ${colors.secondary}
label-separator = |
label-separator-foreground = ${colors.foreground-alt}

menu-0-0 = lock
menu-0-0-exec = xscreensaver-command -lock &
menu-0-1 = reboot
menu-0-1-exec = menu-open-1
menu-0-2 = power off
menu-0-2-exec = menu-open-2

menu-1-0 = cancel
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = sudo reboot

menu-2-0 = cancel
menu-2-0-exec = menu-open-0
menu-2-1 = power off
menu-2-1-exec = sudo poweroff

[module/battery-wattage]
type = custom/script
exec = ~/.config/polybar/scripts/battery-wattage.sh
interval = 5

[module/power-profile]
type = custom/script
exec = ~/.config/polybar/scripts/power-profile.sh
interval = 5
click-left = ~/.config/polybar/scripts/power-profile.sh cycle
click-right = xfce4-power-manager-settings &

[module/tailscale]
type = custom/script
exec = ~/.config/polybar/scripts/tailscale.sh
interval = 10
click-left = ~/.config/polybar/scripts/tailscale-menu.sh &

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 5
click-left = blueman-manager &
click-right = bluetoothctl power off && sleep 1 && bluetoothctl power on &

[module/slack]
type = custom/script
exec = ~/.config/polybar/scripts/slack-unread.sh
interval = 10
click-left = i3-msg '[class="Slack"] focus' &

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
margin-top = 5
margin-bottom = 5

; vim:ft=dosini
